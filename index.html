const PROGRESSION_INCREMENT = {
  "Bench Press": 2.5, "Pull-Downs": 2.5, "Leg Press": 5, "Shoulder Press (DB)": 2, "Leg Curl": 2,
  "Low Rows": 2.5, "DB Bench Press": 2, "RDL": 2.5, "Lateral Raises": 1, "Preacher Curl (machine)": 2,
  "Incline Press": 2.5, "Cable Row": 2.5, "Calf Raises": 2.5, "Triceps Pushdown": 1, "Hammer Curl (machine)": 1,
  "Dips (assisted)": 2.5, "Pull-Ups / Pull-Downs": 2.5, "Incline DB Press": 2, "Chest-Supported Row": 2.5,
  "Shoulder Press": 2.5, "Bulgarian Split Squat*": 2.5,
};
function parseScheme(scheme) {
  if (!scheme) return null;
  const m = scheme.match(/^(\d+)\s*x\s*(\d+)-(\d+)/);
  if (!m) return null;
  return { sets: parseInt(m[1], 10), repMin: parseInt(m[2], 10), repMax: parseInt(m[3], 10) };
}
function parseReps(repsStr) {
  if (!repsStr) return [];
  return repsStr.split(",").map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
}
function repSuccessLevel(repsStr, scheme) {
  const range = parseScheme(scheme);
  if (!range) return null;
  const reps = parseReps(repsStr);
  if (reps.length < range.sets) return null;
  const relevant = reps.slice(0, range.sets);
  if (relevant.every(r => r >= range.repMax)) return "gold";
  if (relevant.every(r => r >= range.repMin)) return "green";
  return "rust";
}
function getScheme(phaseIdx, sessionName, exerciseName) {
  const phase = PHASE_SESSIONS[phaseIdx];
  if (!phase) return null;
  const list = phase.sessions[sessionName];
  if (!list) return null;
  const found = list.find(([n]) => n === exerciseName);
  return found ? found[1] : null;
}
function weekInPhaseForWeekIndex(wi) {
  let cursor = 0;
  for (let i = 0; i < PHASES.length; i++) { if (wi < cursor + PHASES[i].weeks) return wi - cursor + 1; cursor += PHASES[i].weeks; }
  return wi - cursor + 1;
}
function isDeloadForDate(dateStr) {
  const wi = weekIndexOf(dateStr);
  const ph = phaseForWeekIndex(wi);
  const wip = weekInPhaseForWeekIndex(wi);
  return isDeloadWeek(ph, wip);
}
function suggestedNextWeight(exerciseName, lastWeight, level) {
  if (level !== "gold" || lastWeight === "" || lastWeight == null) return lastWeight;
  const inc = PROGRESSION_INCREMENT[exerciseName] ?? 2.5;
  const n = parseFloat(lastWeight);
  if (isNaN(n)) return lastWeight;
  const next = REVERSE_PROGRESS.includes(exerciseName) ? n - inc : n + inc;
  return Math.round(next * 2) / 2;
}
function bestPriorEntry(sessionLogs, exerciseName) {
  for (const s of sessionLogs) {
    if (isDeloadForDate(s.date)) continue;
    const found = s.exercises.find(e => e.name === exerciseName);
    if (found && found.weight !== "") {
      const scheme = getScheme(s.phaseIdx, s.sessionName, exerciseName);
      const level = scheme ? repSuccessLevel(found.reps, scheme) : null;
      return { weight: found.weight, level };
    }
  }
  return { weight: START_WEIGHTS[exerciseName] || "", level: null };
}
function plateauCheck(sessionLogs, exerciseName) {
  const relevant = [];
  for (const s of sessionLogs) {
    if (isDeloadForDate(s.date)) continue;
    const found = s.exercises.find(e => e.name === exerciseName);
    if (!found || found.weight === "") continue;
    const scheme = getScheme(s.phaseIdx, s.sessionName, exerciseName);
    const level = scheme ? repSuccessLevel(found.reps, scheme) : null;
    relevant.push({ weight: found.weight, level, date: s.date });
    if (relevant.length === 3) break;
  }
  if (relevant.length < 3) return null;
  const sameWeight = relevant.every(r => r.weight === relevant[0].weight);
  const noneGold = relevant.every(r => r.level !== "gold");
  return sameWeight && noneGold ? { weight: relevant[0].weight, count: relevant.length } : null;
}

function weeksBetween(a, b) { return Math.floor((b - a) / 6048e5); }

function formatHeaderDate() {

  const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  const d = new Date();
  return days[d.getDay()] + ", " + d.getDate() + " " + months[d.getMonth()];
}
function phaseForWeekIndex(wi) {
  let cursor = 0;
  for (let i = 0; i < PHASES.length; i++) { if (wi < cursor + PHASES[i].weeks) return i; cursor += PHASES[i].weeks; }
  return PHASES.length - 1;
}
function currentWeekInfo() {
  const now = new Date();
  const totalWeeks = weeksBetween(START_DATE, END_DATE);
  const elapsedRaw = weeksBetween(START_DATE, now);
  const elapsed = Math.max(0, Math.min(totalWeeks, elapsedRaw));
  let cursor = 0, phaseIdx = 0, weekInPhase = elapsed;
  for (let i = 0; i < PHASES.length; i++) {
    if (elapsed < cursor + PHASES[i].weeks) { phaseIdx = i; weekInPhase = elapsed - cursor + 1; break; }
    cursor += PHASES[i].weeks; phaseIdx = i; weekInPhase = elapsed - cursor + 1;
  }
  return { totalWeeks, elapsed, elapsedRaw, phaseIdx, weekInPhase: Math.max(1, weekInPhase) };
}

function domainDueOnDay(domain, info) {

  if (domain === "weights") return data.sessions.some(s => s.date === dateStr);
  if (domain === "run") return data.runs.some(r => r.date === dateStr);

function mobilityActionsForDay(info) {
  let n = 0;
  if (info.tag === "strength") {
    n += 1;
    if (info.activity.includes("Ankle")) n += 1;
  } else if (info.tag === "run") {
    if (info.activity.includes("Ankle")) n += 1;
  } else if (info.tag === "ankle") {
    n += 1;
  } else if (info.activity.toLowerCase().includes("flexibility")) {
    n += 1;
  }

    const idx = todayIdx + offset;

function buildTodayChecklist(phaseIdx, weekInPhase, data, todayStr) {
  const template = weekTemplate(phaseIdx, weekInPhase);
  const todayName = DAY_NAMES[(new Date().getDay() + 6) % 7];
  const info = template[todayName];
  const items = [];
  const sessionDone = data.sessions.some(s => s.date === todayStr);
  const ankleDone = data.ankle.sessions.some(s => s.date === todayStr);
  const flexDone = data.flexibility.some(s => s.date === todayStr);
  const runDone = data.runs.some(r => r.date === todayStr);
  if (info.tag === "strength") {
    items.push({ label: "Weight training", done: sessionDone, tab: "sessions" });
    items.push({ label: "Flexibility", done: flexDone, tab: "mobility" });
    if (info.activity.includes("Ankle")) items.push({ label: "Ankle work", done: ankleDone, tab: "mobility" });
  } else if (info.tag === "run") {
    items.push({ label: "Run", done: runDone, tab: "run" });
    if (info.activity.includes("Ankle")) items.push({ label: "Ankle work", done: ankleDone, tab: "mobility" });
  } else if (info.tag === "ankle") {
    items.push({ label: "Ankle work", done: ankleDone, tab: "mobility" });
  } else if (info.activity.toLowerCase().includes("flexibility")) {
    items.push({ label: "Flexibility", done: flexDone, tab: "mobility" });
  }
  items.push({ label: "Log today's nutrition", done: data.nutritionComplete.includes(todayStr), tab: "food" });
  return items;
}

function Timeline({ data, onPhaseClick }) {
  const { totalWeeks, elapsed, phaseIdx } = currentWeekInfo();
  const pct = Math.min(100, (elapsed / totalWeeks) * 100);
  const target = PHASE_TARGET[phaseIdx];
  const startWeight = PHASE_START_WEIGHT[phaseIdx];
  const latest = data.stats[0] ? parseFloat(data.stats[0].weight) : null;
  let goalPct = null, remaining = null;
  if (latest != null) {
    if (phaseIdx === 1) {
      goalPct = ((latest - startWeight) / (target.weight - startWeight)) * 100;
      remaining = target.weight - latest;
    } else {
      goalPct = ((startWeight - latest) / (startWeight - target.weight)) * 100;
      remaining = latest - target.weight;
    }
    goalPct = Math.max(0, Math.min(100, goalPct));
  }
  return (
    <div style={{ padding: "20px 18px 14px" }}>
      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, letterSpacing: "0.12em", color: muted, textTransform: "uppercase", marginBottom: 6 }}>
        Week {elapsed + 1} of {totalWeeks} · {PHASES[phaseIdx].name}
      </div>
      <div style={{ position: "relative", height: 6, background: "#2E3F31", borderRadius: 10, marginBottom: 8 }}>
        <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: pct + "%", background: gold, borderRadius: 10 }} />
        {[17, 33].map((w, i) => <div key={i} style={{ position: "absolute", left: (w/totalWeeks*100) + "%", top: -3, width: 2, height: 12, background: bg }} />)}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'Nunito Sans', sans-serif", fontSize: 11, color: muted, marginBottom: 3 }}>
        {PHASES.map((p, i) => (
          <button key={i} onClick={() => onPhaseClick && onPhaseClick(i)}
            style={{ background: "none", border: "none", padding: 0, cursor: "pointer", color: phaseIdx === i ? gold : muted, fontWeight: phaseIdx === i ? 700 : 400, fontFamily: "'Nunito Sans', sans-serif", fontSize: 11, textDecoration: "underline", textDecorationStyle: "dotted", textDecorationColor: phaseIdx === i ? gold : "#5A6B54", textUnderlineOffset: "3px" }}>
            {p.name}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 9.5, color: "#5A6B54", fontStyle: "italic", marginBottom: latest != null ? 10 : 0 }}>Tap a phase for details</div>
      {latest != null && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10.5, color: muted, marginBottom: 3 }}>
            <span>{latest}kg → {target.weight}kg</span>
            <span>{remaining > 0.05 ? remaining.toFixed(1) + "kg to go" : "Target reached"}</span>
          </div>
          <div style={{ position: "relative", height: 5, background: "#2E3F31", borderRadius: 8 }}>
            <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: goalPct + "%", background: "#7A8F5C", borderRadius: 8 }} />
          </div>
        </div>
      )}
    </div>
  );
}

function MiniChart({ data, baseline }) {
  if (data.length < 2) return <EmptyState text="Log at least twice to see a trend." />;
  const w = 300, h = 120, pad = 24;
  const values = data.map(d => d.value);
  const min = Math.min(...values, baseline != null ? baseline : Infinity) - 2;
  const max = Math.max(...values, baseline != null ? baseline : -Infinity) + 2;
  const x = i => pad + (i / (data.length - 1)) * (w - pad * 2);
  const y = v => h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
  const points = data.map((d, i) => x(i) + "," + y(d.value)).join(" ");
  return (
    <svg width="100%" viewBox={"0 0 " + w + " " + h}>
      {baseline != null && <line x1={pad} x2={w-pad} y1={y(baseline)} y2={y(baseline)} stroke="#8C4A2A" strokeDasharray="4 4" strokeWidth="1" />}
      <polyline points={points} fill="none" stroke={gold} strokeWidth="2" />
      {data.map((d, i) => <circle key={i} cx={x(i)} cy={y(d.value)} r="3" fill={gold} />)}
      {data.map((d, i) => (i === 0 || i === data.length - 1) &&
        <text key={i} x={x(i)} y={h - 6} fontSize="9" fill={muted} textAnchor={i === 0 ? "start" : "end"}>{d.date}</text>)}
    </svg>
  );
}
function ExerciseMiniChart({ data, baseline }) {

function bestPriorWeight(sessionLogs, exerciseName) {
  for (const s of sessionLogs) {
    const found = s.exercises.find(e => e.name === exerciseName);
    if (found && found.weight !== "") return found.weight;
  }
  return START_WEIGHTS[exerciseName] || "";
}

function SessionForm({ sessions, priorSessions, initial, isDeload, onSubmit }) {
  const names = Object.keys(sessions);
  const [sessionName, setSessionName] = useState(initial ? initial.sessionName : names[0]);
  const [rows, setRows] = useState({});
  useEffect(() => {
    const exercises = sessions[sessionName] || sessions[names[0]];
    const init = {};
    exercises.forEach(([name]) => {
      if (name === "Plank" || name === "Bicycle Crunch") return;
      const existing = initial && initial.sessionName === sessionName ? initial.exercises.find(e => e.name === name) : null;
      if (existing) { init[name] = { weight: existing.weight, reps: existing.reps, bumped: false }; }
      else {
        const { weight: prior, level } = bestPriorEntry(priorSessions, name);
        if (isDeload && prior !== "") {
          init[name] = { weight: deloadWeight(prior), reps: "", bumped: false };
        } else if (level === "gold" && prior !== "") {
          init[name] = { weight: suggestedNextWeight(name, prior, level), reps: "", bumped: true, priorWeight: prior };
        } else {
          init[name] = { weight: prior, reps: "", bumped: false };
        }
      }
    });
    setRows(init);
  }, [sessionName]);
  const updateRow = (name, field, value) => setRows(r => ({ ...r, [name]: { ...r[name], [field]: value, bumped: field === "weight" ? false : r[name]?.bumped } }));
  const submit = () => {
    const exercises = Object.entries(rows).filter(([, v]) => v.weight !== "" || v.reps !== "").map(([name, v]) => ({ name, weight: v.weight, reps: v.reps }));
    if (exercises.length) onSubmit(sessionName, exercises);
  };
  return (
    <FormShell>
      {isDeload && <div style={{ fontSize: 11.5, color: "#8C4A2A", fontStyle: "italic", marginBottom: 10 }}>Deload week — weights pre-filled at ~90% of last logged, sets roughly halved.</div>}

            <input style={inputStyle} placeholder="Reps e.g. 8,8,8" value={rows[name]?.reps ?? ""} onChange={e => updateRow(name, "reps", e.target.value)} />

    const totals = dates.map(d => mealsByDate[d].reduce((s, m) => s + Number(m[key]||0), 0));

                  </select>
                </div>
                {chartExercise && REVERSE_PROGRESS.includes(chartExercise) && <div style={{ fontSize: 10.5, color: "#8C4A2A", fontStyle: "italic", marginBottom: 6 }}>Lower number = less assistance = stronger.</div>}
                {chartExercise && (() => {
                  const plateau = plateauCheck(data.sessions, chartExercise);
                  return plateau ? (
                    <div style={{ fontSize: 11, color: "#8C4A2A", fontWeight: 600, marginBottom: 8, padding: "6px 8px", background: "#F3E4D8", borderRadius: 6 }}>
                      ⚠️ Stuck at {plateau.weight}kg for {plateau.count} sessions without hitting all reps — consider holding steady, checking recovery, or reviewing form.
                    </div>
                  ) : null;
                })()}
                <ExerciseMiniChart data={chartData} baseline={BASELINE[chartExercise]} />
              </div>
            )}
            <div style={{ fontSize: 12, textTransform: "uppercase", color: "#9A9C8E", marginBottom: 8 }}>Session history — last 2 weeks</div>
            {data.sessions.length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, fontSize: 9.5, color: "#8FA38C", marginBottom: 10 }}>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#D4AF37", marginRight: 4 }} />All reps hit</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#7A8F5C", marginRight: 4 }} />In range</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#8C4A2A", marginRight: 4 }} />Below range</span>
              </div>
            )}
            {data.sessions.length === 0 ? <EmptyState text="No sessions logged yet." /> :
              data.sessions.slice(0, sessionsShown).map((s, i) => (
                <Entry key={i} onEdit={() => { setEditingSessionIdx(i); setShowForm(null); }} onDelete={() => { if (editingSessionIdx === i) setEditingSessionIdx(null); deleteSession(i); }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, paddingRight: 40 }}>
                    <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, fontWeight: 600 }}>{s.sessionName}</span>
                    <span style={{ fontSize: 11, color: "#6B6F63" }}>{s.date}</span>
                  </div>
                  {s.exercises.filter(e => e.weight !== "").map((e, j) => {
                    const scheme = getScheme(s.phaseIdx, s.sessionName, e.name);
                    const level = isDeloadForDate(s.date) ? null : (scheme ? repSuccessLevel(e.reps, scheme) : null);
                    const levelColor = level === "gold" ? "#D4AF37" : level === "green" ? "#7A8F5C" : level === "rust" ? "#8C4A2A" : "#2B2318";
                    return (
                      <div key={j} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "2px 0" }}>
                        <span>{e.name}</span><span style={{ color: levelColor, fontWeight: level ? 700 : 400 }}>{e.weight}kg × {e.reps}</span>
                      </div>
                    );
                  })}
                </Entry>
              ))}
            <ShowMoreButton remaining={data.sessions.length - sessionsShown} onClick={() => setSessionsExtra(v => v + 10)} />
          </div>
        )}

        {tab === "run" && (
          <div>
            <AddButton label="Log a run" onClick={() => setShowForm(showForm === "run" ? null : "run")} />
            {showForm === "run" && <RunForm onSubmit={e => { addRun(e); setShowForm(null); }} />}
            {data.runs.length > 0 && <div style={{ fontSize: 12, textTransform: "uppercase", color: "#8FA38C", marginBottom: 8 }}>Run history — last 2 weeks</div>}
            {data.runs.length === 0 ? <EmptyState text="Running starts week 5 of Phase 1." /> :
              data.runs.slice(0, runsShown).map((r, i) => (
                <Entry key={i} onDelete={() => deleteRun(i)}>
                  <div style={{ display: "flex", justifyContent: "space-between", paddingRight: 24 }}>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 600 }}>{r.distance}km · {r.duration}min</div>
                      <div style={{ fontSize: 11, color: r.continuous ? "#7A8F5C" : "#8C4A2A" }}>{r.continuous ? "Uninterrupted" : "Run/walk intervals"}</div>
                    </div>
                    <div style={{ fontSize: 11, color: "#6B6F63" }}>{r.date}</div>
                  </div>
                </Entry>
              ))}
            <ShowMoreButton remaining={data.runs.length - runsShown} onClick={() => setRunsExtra(v => v + 10)} />
          </div>
        )}

        {tab === "mobility" && (
          <div>
            <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
              <SubTab label="Ankle" active={mobilitySubTab === "ankle"} onClick={() => setMobilitySubTab("ankle")} />
              <SubTab label="Flexibility" active={mobilitySubTab === "flex"} onClick={() => setMobilitySubTab("flex")} />
            </div>
            {mobilitySubTab === "ankle" && (
              <div>
                <div style={{ ...card, padding: 14, marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: "#6B6F63", marginBottom: 8, textTransform: "uppercase" }}>Current stage</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {[1,2].map(s => (
                      <button key={s} onClick={() => setAnkleStage(s)} style={{ flex: 1, padding: "8px 0", borderRadius: 6, border: "none", cursor: "pointer", background: data.ankle.stage === s ? gold : "#E4DFD1", color: data.ankle.stage === s ? "#201B10" : "#6B6F63", fontWeight: 700 }}>Stage {s}</button>
                    ))}
                  </div>
                </div>
                <ExerciseChecklist exercises={ANKLE_EXERCISES[data.ankle.stage]} onSubmit={addAnkleChecklist} submitLabel="Log completed exercises" />
                <div style={{ fontSize: 12, textTransform: "uppercase", color: "#9A9C8E", marginBottom: 8, marginTop: 6 }}>History</div>
                {data.ankle.sessions.length === 0 ? <EmptyState text="No sessions logged yet." /> :
                  data.ankle.sessions.slice(0, 12).map((s, i) => (
                    <Entry key={i} onDelete={() => deleteAnkleEntry(i)}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, paddingRight: 24 }}>
                        <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14 }}>Stage {s.stage}</span>
                        <span style={{ fontSize: 11, color: "#6B6F63" }}>{s.date}</span>
                      </div>
                      {(s.exercises || []).map((ex, j) => <div key={j} style={{ fontSize: 12, padding: "1px 0" }}>✓ {ex}</div>)}
                    </Entry>
                  ))}
              </div>
            )}
            {mobilitySubTab === "flex" && (
              <div>
                <div style={{ color: ink, fontSize: 12.5, marginBottom: 12, lineHeight: 1.5 }}>10-15 min after each strength session, all three phases.</div>
                <ExerciseChecklist exercises={FLEXIBILITY_ROUTINE} onSubmit={addFlexSession} submitLabel="Log flexibility session" />
                <div style={{ fontSize: 12, textTransform: "uppercase", color: "#9A9C8E", marginBottom: 8, marginTop: 6 }}>History</div>
                {data.flexibility.length === 0 ? <EmptyState text="No sessions logged yet." /> :
                  data.flexibility.slice(0, 12).map((s, i) => (
                    <Entry key={i} onDelete={() => deleteFlexEntry(i)}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, paddingRight: 24 }}>
                        <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, fontSize: 14 }}>Flexibility session</span>
                        <span style={{ fontSize: 11, color: "#6B6F63" }}>{s.date}</span>
                      </div>
                      {(s.exercises || []).map((ex, j) => <div key={j} style={{ fontSize: 12, padding: "1px 0" }}>✓ {ex}</div>)}
                    </Entry>
                  ))}
              </div>
            )}
          </div>
        )}

        {tab === "food" && (() => {
          const target = PHASE_NUTRITION[phaseIdx];
          const bodyweight = data.stats[0] ? parseFloat(data.stats[0].weight) : 81;
          const { floor: proteinFloor, optimal: proteinOptimal } = proteinBands(bodyweight);
          const kcalColor = kcalStatusColor(todayTotals.kcal, phaseIdx);
          const proteinColor = proteinStatusColor(todayTotals.protein, proteinFloor, proteinOptimal);
          const mealsByDate = {};
          data.nutrition.forEach(m => { (mealsByDate[m.date] = mealsByDate[m.date] || []).push(m); });
          const pastDates = Object.keys(mealsByDate).filter(d => d !== todayStr).sort((a,b) => b.localeCompare(a));
          const pastDaysRecentCount = pastDates.filter(d => d >= twoWeekCutoffStr()).length;
          const pastDaysShown = pastDaysRecentCount + pastDaysExtra;
          const last7 = Array.from({ length: 7 }, (_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - (6 - i));
            const ds = d.toISOString().slice(0, 10);
            const meals = mealsByDate[ds] || (ds === todayStr ? todayMeals : []);
            if (!meals.length) return { date: ds, logged: false };
            const t = meals.reduce((acc, m) => ({ kcal: acc.kcal + Number(m.kcal||0), protein: acc.protein + Number(m.protein||0) }), { kcal: 0, protein: 0 });
            return { date: ds, logged: true, kcal: t.kcal, protein: t.protein };
          });
          const kcalHits = last7.filter(d => d.logged && d.kcal >= KCAL_RANGES[phaseIdx].floor && d.kcal <= KCAL_RANGES[phaseIdx].softOverMax).length;
          const proteinHits = last7.filter(d => d.logged && d.protein >= proteinFloor).length;
          const loggedDays = last7.filter(d => d.logged).length;
          return (
          <div>
            <div style={{ ...card, padding: "12px 14px", marginBottom: 14 }}>
              <div style={{ fontSize: 11, textTransform: "uppercase", color: "#6B6F63", marginBottom: 6 }}>{PHASES[phaseIdx].name} target</div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 700 }}>{KCAL_RANGES[phaseIdx].floor}+ kcal</div>
              <div style={{ fontSize: 11, color: "#8A7B5C" }}>Optimal {KCAL_RANGES[phaseIdx].optimalMin}–{KCAL_RANGES[phaseIdx].optimalMax} kcal</div>
              <div style={{ fontSize: 12, color: "#4A4D42" }}>{target.fat}g fat · {target.carbs}g carbs</div>
              <div style={{ fontSize: 11.5, color: "#8A7B5C", marginTop: 4 }}>{"Protein — floor " + proteinFloor + "g · optimal " + proteinOptimal + "g (1.6-2.0g/kg, from your last logged weight)"}</div>
            </div>

            <div style={{ ...card, padding: "12px 14px", marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                <span style={{ fontSize: 11, textTransform: "uppercase", color: "#6B6F63" }}>Today so far</span>
                {todayComplete && <span style={{ fontSize: 11, color: "#7A8F5C", fontWeight: 700 }}>✓ Day complete</span>}
              </div>
              <div style={{ display: "flex", gap: 16, alignItems: "baseline" }}>
                <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 700, color: kcalColor }}>{todayTotals.kcal} kcal</span>
                <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 15, fontWeight: 700, color: proteinColor }}>{todayTotals.protein}g P</span>
              </div>
              <div style={{ fontSize: 12, color: "#4A4D42", marginBottom: 4 }}>{todayTotals.fat}g F · {todayTotals.carbs}g C — {todayMeals.length} {todayMeals.length === 1 ? "meal" : "meals"} logged</div>
              {todayComplete && kcalStatusLabel(todayTotals.kcal, phaseIdx) && (
                <div style={{ fontSize: 11, color: kcalColor, fontWeight: 700, marginBottom: 4 }}>{kcalStatusLabel(todayTotals.kcal, phaseIdx)}</div>
              )}
              {todayComplete && (
                <div style={{ fontSize: 11, color: proteinColor, fontWeight: 700, marginBottom: 8 }}>{proteinStatusLabel(todayTotals.protein, proteinFloor, proteinOptimal)}</div>
              )}
              <button onClick={() => toggleDayComplete(todayStr)}
                style={{ width: "100%", padding: "8px 0", borderRadius: 6, border: "none", cursor: "pointer",
                  background: todayComplete ? "#E4DFD1" : gold, color: todayComplete ? "#6B6F63" : "#201B10", fontWeight: 700, fontSize: 12.5 }}>
                {todayComplete ? "Undo — still adding meals" : "Mark today's log complete"}
              </button>
            </div>

            <AddButton label="Add a meal" onClick={() => setShowForm(showForm === "food" ? null : "food")} />
            {showForm === "food" && <MealForm onSubmit={e => { addMeal(e); setShowForm(null); }} />}

            {todayMeals.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                {todayMeals.map(n => {
                  const idx = data.nutrition.indexOf(n);
                  return (
                    <Entry key={idx} onDelete={() => deleteMeal(idx)}>
                      <div style={{ display: "flex", justifyContent: "space-between", paddingRight: 24 }}>
                        <div>
                          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 14, fontWeight: 700 }}>{n.meal || "Meal"}</div>
                          <div style={{ fontSize: 11.5, color: "#4A4D42" }}>{n.kcal} kcal · {n.protein}g P · {n.fat}g F · {n.carbs}g C</div>
                        </div>
                      </div>
                    </Entry>
                  );
                })}
              </div>
            )}

            <div style={{ ...card, padding: 14, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                <span style={{ fontSize: 12, textTransform: "uppercase", color: "#6B6F63" }}>This week</span>
                <span style={{ fontSize: 11, color: "#8A7B5C" }}>{loggedDays}/7 days logged</span>
              </div>
              <div style={{ fontSize: 10.5, color: "#6B6F63", marginBottom: 4 }}>Calories on target</div>
              <div style={{ display: "flex", gap: 5, marginBottom: 10 }}>
                {last7.map((d, i) => (
                  <div key={i} title={d.logged ? `${d.date}: ${d.kcal} kcal` : `${d.date}: not logged`}
                    style={{ flex: 1, height: 14, borderRadius: 3, background: !d.logged ? "#D8D2C2" : kcalStatusColor(d.kcal, phaseIdx) }} />
                ))}
              </div>
              <div style={{ fontSize: 10.5, color: "#6B6F63", marginBottom: 4 }}>{"Protein (floor " + proteinFloor + "g · optimal " + proteinOptimal + "g)"}</div>
              <div style={{ display: "flex", gap: 5, marginBottom: 8 }}>
                {last7.map((d, i) => (
                  <div key={i} title={d.logged ? `${d.date}: ${d.protein}g protein` : `${d.date}: not logged`}
                    style={{ flex: 1, height: 14, borderRadius: 3, background: !d.logged ? "#D8D2C2" : proteinStatusColor(d.protein, proteinFloor, proteinOptimal) }} />
                ))}
              </div>
              <div style={{ fontSize: 10.5, color: "#8A7B5C", marginBottom: 8 }}>{kcalHits}/{loggedDays || 0} days met deficit floor · {proteinHits}/{loggedDays || 0} days met protein floor</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, fontSize: 9.5, color: "#6B6F63" }}>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: GOLD_STATUS, marginRight: 4 }} />Optimal</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: GREEN_STATUS, marginRight: 4 }} />Floor met</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: ORANGE_STATUS, marginRight: 4 }} />Over (kcal only)</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: RUST_STATUS, marginRight: 4 }} />Below floor</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#D8D2C2", marginRight: 4 }} />No data</span>
              </div>
            </div>

            {data.nutrition.length > 0 && (
              <div style={{ ...card, padding: "12px 14px", marginBottom: 16 }}>
                <div style={{ fontSize: 11, textTransform: "uppercase", color: "#6B6F63", marginBottom: 6 }}>Last 7 days avg (daily totals)</div>
                <div style={{ display: "flex", gap: 20 }}>
                  <StatBadge label="Kcal" value={rollingDailyAvg(mealsByDate, 7, "kcal")} />
                  <StatBadge label="Protein" value={rollingDailyAvg(mealsByDate, 7, "protein") + "g"} />
                </div>
              </div>
            )}

            {pastDates.length > 0 && (
              <>
                <div style={{ fontSize: 12, textTransform: "uppercase", color: "#8FA38C", marginBottom: 8 }}>Past days — last 2 weeks</div>
                {pastDates.slice(0, pastDaysShown).map(date => {
                  const meals = mealsByDate[date];
                  const total = meals.reduce((acc, m) => ({ kcal: acc.kcal + Number(m.kcal||0), protein: acc.protein + Number(m.protein||0) }), { kcal: 0, protein: 0 });
                  const complete = data.nutritionComplete.includes(date);
                  return (
                    <Entry key={date}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                        <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 14, fontWeight: 700 }}>{date}{complete && <span style={{ color: "#7A8F5C" }}> ✓</span>}</span>
                        <span style={{ fontSize: 11, display: "flex", gap: 8 }}>
                          <span style={{ color: kcalStatusColor(total.kcal, phaseIdx), fontWeight: 700 }}>{total.kcal} kcal</span>
                          <span style={{ color: proteinStatusColor(total.protein, proteinFloor, proteinOptimal), fontWeight: 700 }}>{total.protein}g P</span>
                        </span>
                      </div>
                      {meals.map(m => {
                        const idx = data.nutrition.indexOf(m);
                        return (
                          <div key={idx} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "2px 0" }}>
                            <span>{m.meal || "Meal"}</span>
                            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              {m.kcal}kcal
                              <button onClick={() => deleteMeal(idx)} style={{ background: "none", border: "none", cursor: "pointer", color: "#8A7B5C" }}>×</button>
                            </span>
                          </div>
                        );
                      })}
                    </Entry>
                  );
                })}
                <ShowMoreButton remaining={pastDates.length - pastDaysShown} onClick={() => setPastDaysExtra(v => v + 10)} />
              </>
            )}
          </div>
          );
        })()}

        {tab === "data" && (
          <div>
            <div style={{ color: ink, fontSize: 12.5, marginBottom: 14, lineHeight: 1.6 }}>
              Everything logged here lives only on this device. Export a backup regularly, especially before switching phones.
            </div>
            <button onClick={exportDataFn} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", background: gold, color: "#201B10", fontWeight: 700, fontSize: 13, padding: "11px 0", borderRadius: 8, border: "none", cursor: "pointer", marginBottom: 10 }}>
              ⬇ Export data
            </button>
            <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", background: "#E4DFD1", color: "#2B2318", fontWeight: 700, fontSize: 13, padding: "11px 0", borderRadius: 8, border: "none", cursor: "pointer", marginBottom: 10 }}>
              ⬆ Import data
            </button>
            <input ref={fileInputRef} type="file" accept="application/json" style={{ display: "none" }}
              onChange={e => { if (e.target.files[0]) importDataFn(e.target.files[0]); e.target.value = ""; }} />
            <button onClick={resetAll} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", background: "transparent", color: "#8C4A2A", fontWeight: 700, fontSize: 12.5, padding: "10px 0", borderRadius: 8, border: "1px solid #8C4A2A", cursor: "pointer" }}>
              ↺ Reset all data
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
}
</script>
</body>
</html>
